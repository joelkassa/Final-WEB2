<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceHub — Find trusted local professionals</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">ServiceHub</a>
    <nav class="nav-links">
      <a href="index.html" class="active">Browse</a>
      <a href="login.html" id="nav-login">Log in</a>
      <a href="register.html" id="nav-register" class="btn btn-sm btn-primary">Sign up</a>
      <a href="dashboard-client.html" id="nav-dash" style="display:none;">Dashboard</a>
      <button id="nav-logout" class="btn btn-sm btn-ghost" style="display:none;">Log out</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Find someone you can trust for the job</h1>
      <p class="hero-sub">Verified plumbers, electricians, hairstylists, caterers, and more — booked and rated by real clients.</p>
    </section>

    <section class="filter-bar">
      <select id="filter-category">
        <option value="">All categories</option>
      </select>
      <input type="text" id="filter-name" placeholder="Search by name...">
      <input type="text" id="filter-location" placeholder="Location...">
      <select id="filter-rating">
        <option value="">Any rating</option>
        <option value="4">4+ stars</option>
        <option value="3">3+ stars</option>
      </select>
      <button id="filter-apply" class="btn btn-primary">Search</button>
    </section>

    <section class="card-grid" id="worker-grid">
      <!-- worker cards get injected here by js/browse.js -->
      <p class="empty-state">Loading professionals...</p>
    </section>
  </main>

  <footer class="footer">
    <p>ServiceHub — Web Programming II final project</p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
