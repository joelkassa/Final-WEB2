<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Handy-Manny</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">Handy-Manny</a>
    <nav class="nav-links">
      <a href="index.html">Browse</a>
      <a href="login.html">Log in</a>
      <a href="register.html" class="btn btn-sm btn-primary">Sign up</a>
    </nav>
  </header>

  <main>
    <div class="form-card">
      <h2>Reset your password</h2>
      <p class="helper-text">Enter your account email and we'll send you a reset link.</p>
      <form id="forgot-form">
        <label for="email">Email</label>
        <input type="email" id="email" required>
        <p class="form-error" id="forgot-error"></p>
        <p id="forgot-success" class="success-text hidden">
          If that email exists, a reset link has been sent.
        </p>
        <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
