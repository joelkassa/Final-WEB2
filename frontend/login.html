<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Handy-Manny</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">Handy-Manny</a>
    <nav class="nav-links">
      <a href="index.html">Browse</a>
      <a href="login.html" class="active">Log in</a>
      <a href="register.html" class="btn btn-sm btn-primary">Sign up</a>
    </nav>
  </header>

  <main>
    <div class="form-card">
      <h2>Log in</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" required>

        <p class="form-error" id="login-error"></p>

        <button type="submit" class="btn btn-primary btn-block">Log in</button>
        <p class="link-row-right"><a href="forgot-password.html">Forgot your password?</a></p>
      </form>
      <p class="link-row">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
