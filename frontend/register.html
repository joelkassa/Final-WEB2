<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — ServiceHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">ServiceHub</a>
    <nav class="nav-links">
      <a href="index.html">Browse</a>
      <a href="login.html">Log in</a>
      <a href="register.html" class="active btn btn-sm btn-primary">Sign up</a>
    </nav>
  </header>

  <main>
    <div class="form-card">
      <h2>Create your account</h2>

      <label>I am signing up as a...</label>
      <div style="display:flex; gap:10px; margin-top:6px;">
        <button type="button" class="btn role-btn active" data-role="client" style="flex:1;">Client</button>
        <button type="button" class="btn role-btn" data-role="worker" style="flex:1;">Worker / provider</button>
      </div>
      <input type="hidden" id="role" value="client">

      <form id="register-form">
        <label for="name">Full name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" minlength="8" required>

        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" minlength="8" required>

        <p class="form-error" id="register-error"></p>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">Sign up</button>
      </form>
      <p style="margin-top:16px; font-size:14px; color:var(--muted);">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Role toggle buttons
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('role').value = btn.dataset.role;
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('register-error');
      errorEl.textContent = '';

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const payload = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password,
          role: document.getElementById('role').value
        };
        const user = await AuthClient.register(payload);
        if (user.role === 'worker') {
          // Workers land on their dashboard to complete their profile next
          window.location.href = 'dashboard-worker.html';
        } else {
          window.location.href = 'dashboard-client.html';
        }
      } catch (err) {
        errorEl.textContent = err.message || 'Registration failed.';
      }
    });
  </script>
</body>
</html>
