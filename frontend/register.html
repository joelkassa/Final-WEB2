<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — ServiceHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="nav">
    <a href="index.html" class="nav-logo">ServiceHub</a>
    <nav class="nav-links">
      <a href="index.html">Browse</a>
      <a href="login.html">Log in</a>
      <a href="register.html" class="active btn btn-sm btn-primary">Sign up</a>
    </nav>
  </header>

  <main>
    <div class="form-card">
      <h2>Create your account</h2>

      <label>I am signing up as a...</label>
      <div class="role-toggle">
        <button type="button" class="btn role-btn active" data-role="client">Client</button>
        <button type="button" class="btn role-btn" data-role="worker">Worker / provider</button>
      </div>
      <input type="hidden" id="role" value="client">

      <form id="register-form">
        <label for="name">Full name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" minlength="8" required>

        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" minlength="8" required>

        <p class="form-error" id="register-error"></p>

        <button type="submit" class="btn btn-primary btn-block">Sign up</button>
      </form>
      <p class="link-row">
        Already have an account? <a href="login.html">Log in</a> ·
        <a href="forgot-password.html">Forgot password?</a>
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
